# docker-compose.yml

services:
  backend:
    build: ./backend
    container_name: petition_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env  # HuggingFace API key'i buradan alacak

  frontend:
    build: ./frontend
    container_name: petition_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend # Önce backend ayağa kalksın, sonra frontend